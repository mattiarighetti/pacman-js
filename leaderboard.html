<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexi Pacman Leaderboard</title>
    <style>
      :root {
        --nexi-blue: #2d32aa;
        --nexi-dark: #0a1248;
        --nexi-accent: #36d2c0;
        --nexi-yellow: #ffd400;
        --pixel-black: #02061a;
        --text-light: #f3f6ff;
        --surface: #08123f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background:
          linear-gradient(180deg, #1723a6 0%, var(--nexi-blue) 42%, #08103d 100%);
        color: var(--text-light);
        font-family: 'Press Start 2P', sans-serif;
        margin: 0;
        min-height: 100vh;
        position: relative;
      }

      body::before {
        background:
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 8px 8px;
        content: "";
        inset: 0;
        opacity: 0.45;
        pointer-events: none;
        position: fixed;
        z-index: 0;
      }

      .board {
        min-height: 100vh;
        padding: 2rem clamp(1rem, 4vw, 3rem);
        position: relative;
        width: 100%;
        z-index: 1;
      }

      .board-header {
        align-items: center;
        border: 4px solid var(--nexi-accent);
        box-shadow: 6px 6px 0 var(--pixel-black);
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: space-between;
        margin: 0 auto 1.5rem;
        max-width: 1100px;
        padding: 1rem;
      }

      .board-title {
        color: var(--nexi-yellow);
        font-size: clamp(1rem, 2.4vw, 1.9rem);
        line-height: 1.25;
        margin: 0;
        text-shadow:
          3px 0 var(--pixel-black),
          0 3px var(--pixel-black),
          -3px 0 var(--pixel-black),
          0 -3px var(--pixel-black),
          0 0 12px rgba(54, 210, 192, 0.55);
        text-transform: uppercase;
      }

      .board-subtitle {
        color: rgba(227, 232, 255, 0.92);
        font-size: 0.65rem;
        line-height: 1.5;
        margin: 0.6rem 0 0;
        max-width: 62ch;
      }

      .board-actions {
        display: flex;
        gap: 0.7rem;
      }

      .btn {
        background: #0a164f;
        border: 3px solid var(--nexi-accent);
        border-radius: 3px;
        box-shadow: 4px 4px 0 var(--pixel-black);
        color: var(--text-light);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.6rem;
        padding: 0.65rem 0.85rem;
        text-decoration: none;
        transition:
          background 0.16s ease-out,
          border-color 0.16s ease-out,
          box-shadow 0.16s ease-out,
          color 0.16s ease-out,
          transform 0.16s ease-out;
      }

      .btn:hover {
        background: #102381;
        transform: translate(-1px, -1px);
      }

      .btn-primary {
        background: var(--nexi-yellow);
        border-color: var(--text-light);
        box-shadow: 4px 4px 0 #e53935;
        color: #0a154f;
      }

      .btn-primary:hover,
      .btn-primary:focus-visible {
        background: #ffec70;
        border-color: #8ffff2;
        box-shadow:
          4px 4px 0 #e53935,
          0 0 0 3px var(--pixel-black),
          0 0 14px rgba(54, 210, 192, 0.7);
        color: #06103d;
        outline: 2px solid #8ffff2;
        outline-offset: 3px;
        transform: translate(-2px, -2px);
      }

      .btn-primary:active {
        box-shadow: 2px 2px 0 #e53935;
        transform: translate(2px, 2px);
      }

      .table-wrap {
        background: var(--surface);
        border: 4px solid var(--nexi-accent);
        border-radius: 3px;
        box-shadow:
          7px 7px 0 var(--pixel-black),
          inset 0 0 0 3px #101e72;
        margin: 0 auto;
        max-width: 1100px;
        overflow-x: auto;
      }

      table {
        border-collapse: collapse;
        width: 100%;
      }

      th,
      td {
        font-size: 0.62rem;
        padding: 1rem 0.8rem;
        text-align: left;
      }

      th {
        background: #06103d;
        border-bottom: 4px solid var(--nexi-accent);
        color: var(--nexi-yellow);
        text-transform: uppercase;
      }

      td {
        border-bottom: 2px solid #172888;
      }

      tr:nth-child(even) td {
        background: rgba(54, 210, 192, 0.08);
      }

      tbody tr:hover td {
        background: rgba(255, 212, 0, 0.14);
      }

      .rank-badge {
        align-items: center;
        background: var(--nexi-yellow);
        border: 3px solid var(--pixel-black);
        border-radius: 2px;
        box-shadow: 2px 2px 0 #e53935;
        color: var(--pixel-black);
        display: inline-flex;
        height: 28px;
        justify-content: center;
        width: 32px;
      }

      .score-cell {
        color: var(--nexi-yellow);
        text-shadow: 2px 2px 0 var(--pixel-black);
      }

      .empty {
        color: rgba(227, 232, 255, 0.9);
        font-size: 0.66rem;
        line-height: 1.7;
        margin: 0 auto;
        max-width: 1100px;
        padding: 1.25rem 0;
        text-align: center;
        text-shadow: 2px 2px 0 var(--pixel-black);
      }

      @media (max-width: 760px) {
        .board {
          padding: 1rem;
        }

        .board-actions {
          width: 100%;
        }

        .btn {
          flex: 1;
          text-align: center;
        }

        th,
        td {
          font-size: 0.54rem;
          padding: 0.7rem 0.5rem;
        }
      }
    </style>
    <link href="https://fonts.googleapis.com/css?family=Press+Start+2P&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main class="board">
      <div class="board-header">
        <div>
          <h1 class="board-title">Pacman Leaderboard</h1>
          <p class="board-subtitle">Classifica live dei migliori score accumulati durante l'hackathon.</p>
        </div>
        <div class="board-actions">
          <a class="btn" href="https://www.nexi.it/it" target="_blank" rel="noopener noreferrer">Nexi.it</a>
          <a class="btn btn-primary" href="index.html">Torna al gioco</a>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th>Giocatore</th>
              <th>Punti</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
      <div id="leaderboard-empty" class="empty" hidden>
        Nessun punteggio registrato. Avvia una partita, totalizza punti e torna qui per vedere la classifica.
      </div>
    </main>

    <script>
      const bodyEl = document.getElementById('leaderboard-body');
      const emptyEl = document.getElementById('leaderboard-empty');

      const rawData = localStorage.getItem('pacmanNexiLeaderboard') || '[]';
      let leaderboard;

      try {
        leaderboard = JSON.parse(rawData);
        if (!Array.isArray(leaderboard)) {
          leaderboard = [];
        }
      } catch (err) {
        leaderboard = [];
      }

      if (leaderboard.length === 0) {
        const highScore = Number(localStorage.getItem('highScore') || 0);
        if (highScore > 0) {
          leaderboard = [
            {
              name: localStorage.getItem('pacmanNexiCurrentPlayer') || 'Player Nexi',
              score: highScore,
              date: new Date().toISOString(),
            },
          ];
        }
      }

      leaderboard
        .sort((a, b) => Number(b.score || 0) - Number(a.score || 0))
        .slice(0, 20)
        .forEach((entry, index) => {
          const tr = document.createElement('tr');
          const date = entry.date
            ? new Date(entry.date).toLocaleDateString('it-IT', {
              day: '2-digit',
              month: '2-digit',
              year: 'numeric',
            })
            : '-';

          tr.innerHTML = `
            <td><span class="rank-badge">${index + 1}</span></td>
            <td>${String(entry.name || 'Player Nexi').slice(0, 20)}</td>
            <td class="score-cell">${Number(entry.score || 0)}</td>
            <td>${date}</td>
          `;
          bodyEl.appendChild(tr);
        });

      if (bodyEl.children.length === 0) {
        emptyEl.hidden = false;
      }
    </script>
  </body>
</html>
